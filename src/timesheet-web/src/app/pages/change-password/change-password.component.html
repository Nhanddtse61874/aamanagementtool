<section class="page" style="max-width:440px;">
  <div class="page-head">
    <div class="icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <div><h1>Change Password</h1><p>Update the password for your own account</p></div>
  </div>

  <form class="card card--pad cp__card" [formGroup]="form" (ngSubmit)="submit()">
    @if (error(); as message) {
      <p class="cp__error" role="alert">{{ message }}</p>
    }

    <label class="cp__field">
      <span>Current password</span>
      <input class="input" type="password" formControlName="currentPassword" autocomplete="current-password" />
    </label>

    <label class="cp__field">
      <span>New password</span>
      <input class="input" type="password" formControlName="newPassword" autocomplete="new-password" />
    </label>

    <label class="cp__field">
      <span>Confirm new password</span>
      <input class="input" type="password" formControlName="confirmPassword" autocomplete="new-password" />
    </label>

    <button type="submit" class="btn btn-primary cp__submit" [disabled]="form.invalid || submitting()">
      {{ submitting() ? 'Changing…' : 'Change password' }}
    </button>
  </form>
</section>
